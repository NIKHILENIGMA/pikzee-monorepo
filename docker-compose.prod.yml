version: '3.8'

services:
  postgres:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # web:
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '0.50'
  #         memory: 1024M
  #       reservations:
  #         cpus: '0.25'
  #         memory: 256M

  api:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M

  # worker:
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '0.50'
  #         memory: 1024M
  #       reservations:
  #         cpus: '0.25'
  #         memory: 256M

  nginx:
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M
