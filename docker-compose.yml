version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pikzee
      POSTGRES_USER: pikzee
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pikzee-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - pikzee-network

  # web:
  #   build:
  #     context: .
  #     dockerfile: apps/web/Dockerfile
  #   environment:
  #     - NODE_ENV=${NODE_ENV:-production}
  #     - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
  #     - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
  #   networks:
  #     - pikzee-network
  #   depends_on:
  #     - api

  api:
    profiles:
      - app
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - DATABASE_URL=postgresql://pikzee:${DATABASE_PASSWORD:-secret}@postgres:5432/pikzee
      - REDIS_URL=redis://redis:6379
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    networks:
      - pikzee-network
    depends_on:
      - postgres
      - redis

  # worker:
  #   build:
  #     context: .
  #     dockerfile: apps/worker/Dockerfile
  #   environment:
  #     - NODE_ENV=${NODE_ENV:-production}
  #     - PORT=3002
  #     - DATABASE_URL=postgresql://pikzee:${DATABASE_PASSWORD:-secret}@postgres:5432/pikzee
  #     - REDIS_URL=redis://redis:6379
  #     - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
  #   networks:
  #     - pikzee-network
  #   depends_on:
  #     - postgres
  #     - redis

  nginx:
    profiles:
      - app
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    networks:
      - pikzee-network
    depends_on:
      - api

networks:
  pikzee-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  certbot-etc:
  certbot-var:
  webroot:
